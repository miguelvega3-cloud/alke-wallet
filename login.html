<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Iniciar Sesión</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <style>
    body { background-color: #f4f6f9; padding-top: 50px; }
    .login-container { max-width: 420px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
  </style>
</head>
<body>

  <div class="container login-container">
    <h2 class="text-center text-dark font-weight-bold mb-4">Iniciar Sesión</h2>
    
    <div id="alert-container"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email" class="font-weight-bold">Correo Electrónico:</label>
        <input type="email" class="form-control" id="email" placeholder="ejemplo@wallet.com" required>
      </div>
      <div class="form-group">
        <label for="password" class="font-weight-bold">Contraseña:</label>
        <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block font-weight-bold shadow-sm">Iniciar sesión</button>
    </form>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    // Inicializar saldo base por defecto en LocalStorage
    if (!localStorage.getItem('walletBalance')) {
      localStorage.setItem('walletBalance', '60000');
    }

    $(document).ready(function() {
      // Uso de jQuery para manejar el envío del formulario
      $('#loginForm').submit(function(e) {
        e.preventDefault();

        // Selectores jQuery para capturar valores
        const email = $('#email').val();
        const password = $('#password').val();
        const $alertContainer = $('#alert-container');

        if (email === "admin@wallet.com" && password === "123456") {
          // Alerta Bootstrap de éxito
          $alertContainer.html(`
            <div class="alert alert-success shadow-sm" role="alert">
              ¡Inicio de sesión exitoso! Redirigiendo al menú...
            </div>
          `);
          
          setTimeout(function() {
            window.location.href = 'menu.html'; 
          }, 1500);
        } else {
          // Alerta Bootstrap de error
          $alertContainer.html(`
            <div class="alert alert-danger shadow-sm" role="alert">
              Credenciales incorrectas. Intente de nuevo.
            </div>
          `);
        }
      });
    });
  </script>
</body>
</html>
