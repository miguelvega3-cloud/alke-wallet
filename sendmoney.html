<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Enviar Dinero</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
  <style>
    body { background-color: #f4f6f9; padding-top: 20px; }
    .container { max-width: 520px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    .selected-contact { background-color: #e2f0d9 !important; border: 2px solid #28a745 !important; }
    .contact-item { cursor: pointer; transition: background 0.2s; }
    .autocomplete-box { max-height: 150px; overflow-y: auto; position: absolute; width: 93%; z-index: 1000; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="text-center font-weight-bold mb-4">Enviar Dinero</h2>
    <div id="alertBox" class="alert d-none shadow-sm"></div>

    <button type="button" class="btn btn-info btn-block font-weight-bold mb-3 shadow-sm" id="btnShowContact">Agregar nuevo contacto</button>

    <div id="contactFormContainer" class="card p-3 mb-4 d-none bg-light border-0 shadow-sm">
      <h5 class="font-weight-bold text-secondary">Nuevo Contacto</h5>
      <div id="validationContactAlert"></div>
      <form id="addContactForm">
        <div class="form-group"><input type="text" id="contactName" class="form-control form-control-sm" placeholder="Nombre y Apellido"></div>
        <div class="form-group"><input type="number" id="contactCbu" class="form-control form-control-sm" placeholder="Número de CBU (9 dígitos)"></div>
        <div class="form-group"><input type="text" id="contactAlias" class="form-control form-control-sm" placeholder="Alias"></div>
        <div class="form-group"><input type="text" id="contactBank" class="form-control form-control-sm" placeholder="Nombre del Banco"></div>
        
        <button type="submit" class="btn btn-success btn-sm font-weight-bold">Guardar Contacto</button>
        <button type="button" class="btn btn-danger btn-sm font-weight-bold" id="btnCancelContact">Cancelar</button>
      </form>
    </div>

    <div class="form-group position-relative">
      <label for="searchContact" class="font-weight-bold">Buscar en la agenda por nombre o alias:</label>
      <input type="text" class="form-control" id="searchContact" placeholder="Escriba para buscar o autocompletar...">
      <div id="autocompleteSuggestions" class="list-group autocomplete-box d-none"></div>
    </div>

    <h5 class="text-secondary font-weight-bold mt-4 mb-2">Agenda de Contactos</h5>
    <ul id="contactList" class="list-group mb-4 shadow-sm">
      <li class="list-group-item contact-item" data-name="John Doe" data-alias="john.doe">
        <strong>John Doe</strong><br><small>CBU: 123456789, Alias: john.doe, Banco: ABC Bank</small>
      </li>
      <li class="list-group-item contact-item" data-name="Jane Smith" data-alias="jane.smith">
        <strong>Jane Smith</strong><br><small>CBU: 987654321, Alias: jane.smith, Banco: XYZ Bank</small>
      </li>
    </ul>

    <form id="sendMoneyForm">
      <div class="form-group">
        <label for="sendAmount" class="font-weight-bold">Monto a enviar:</label>
        <input type="number" id="sendAmount" class="form-control form-control-lg" placeholder="Ingrese el monto" min="1" required>
      </div>
      <button type="submit" id="btnSendMoney" class="btn btn-primary btn-block btn-lg font-weight-bold d-none shadow-sm">Enviar dinero</button>
    </form>
    
    <div id="bottomConfirmation" class="mt-3 text-center font-weight-bold text-success"></div>

    <a href="menu.html" class="btn btn-secondary btn-block mt-3">Volver al Menú Principal</a>
  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script>
    $(document).ready(function() {
      let targetContactName = null;

      // Mostrar/Ocultar paneles
      $('#btnShowContact').click(function() { $('#contactFormContainer').removeClass('d-none'); });
      $('#btnCancelContact').click(function() { $('#contactFormContainer').addClass('d-none'); });

      // Validar creación de contactos
      $('#addContactForm').submit(function(e) {
        e.preventDefault();
        const name = $('#contactName').val().trim();
        const cbu = $('#contactCbu').val().trim();
        const alias = $('#contactAlias').val().trim();
        const bank = $('#contactBank').val().trim();

        if(!name || !cbu || !alias || !bank) {
          $('#validationContactAlert').html('<div class="text-danger small mb-2">Todos los campos son obligatorios.</div>');
          return;
        }
        if(cbu.length !== 9) {
          $('#validationContactAlert').html('<div class="text-danger small mb-2">El CBU debe contener exactamente 9 números.</div>');
          return;
        }

        $('#contactList').append(`
          <li class="list-group-item contact-item" data-name="${name}" data-alias="${alias}">
            <strong>${name}</strong><br><small>CBU: ${cbu}, Alias: ${alias}, Banco: ${bank}</small>
          </li>
        `);
        
        $('#addContactForm')[0].reset();
        $('#validationContactAlert').empty();
        $('#contactFormContainer').addClass('d-none');
      });

      // Lógica de Autocompletado Avanzado con jQuery
      $('#searchContact').on('input', function() {
        const query = $(this).val().toLowerCase();
        const $suggestions = $('#autocompleteSuggestions');
        $suggestions.empty().addClass('d-none');

        if(query.length === 0) return;

        let matches = false;
        $('.contact-item').each(function() {
          const name = $(this).data('name');
          const alias = $(this).data('alias');

          if(name.toLowerCase().includes(query) || alias.toLowerCase().includes(query)) {
            matches = true;
            $suggestions.append(`
              <button type="button" class="list-group-item list-group-item-action autocomplete-item" data-name="${name}">
                ${name} <span class="text-muted small">(@${alias})</span>
              </button>
            `);
          }
        });

        if(matches) $suggestions.removeClass('d-none');
      });

      // Al hacer clic en un elemento autocompletado
      $(document).on('click', '.autocomplete-item', function() {
        const name = $(this).data('name');
        $('#searchContact').val(name);
        $('#autocompleteSuggestions').addClass('d-none');

        // Seleccionar automáticamente en la lista visual
        $('.contact-item').each(function() {
          if($(this).data('name') === name) {
            $(this).trigger('click');
          }
        });
      });

      // Selección visual y aparición dinámica del botón "Enviar dinero"
      $(document).on('click', '.contact-item', function() {
        $('.contact-item').removeClass('selected-contact');
        $(this).addClass('selected-contact');
        targetContactName = $(this).data('name');
        $('#btnSendMoney').removeClass('d-none'); // Mostrar botón
      });

      // Procesamiento de la transferencia
      $('#sendMoneyForm').submit(function(e) {
        e.preventDefault();
        const amount = parseFloat($('#sendAmount').val());
        let balance = parseFloat(localStorage.getItem('walletBalance') || '60000');

        if (amount > balance) {
          $('#alertBox').removeClass('d-none').addClass('alert-danger').text('Fondos insuficientes en la cuenta.');
          return;
        }

        balance -= amount;
        localStorage.setItem('walletBalance', balance.toString());

        let history = JSON.parse(localStorage.getItem('walletTransactions') || '[]');
        history.unshift({ tipo: 'transferencia', detalle: `Transferencia enviada a ${targetContactName} - $${amount.toFixed(2)}` });
        localStorage.setItem('walletTransactions', JSON.stringify(history));

        $('#bottomConfirmation').text(`¡Envío de $${amount.toLocaleString('es-CL')} a ${targetContactName} realizado con éxito!`);
        $('#alertBox').addClass('d-none');

        setTimeout(function() {
          window.location.href = 'menu.html';
        }, 2000);
      });
    });
  </script>
</body>
</html>
